<div class="flex items-center justify-between px-4">
    <a [routerLink]="['/products']">
        <h1>Shop</h1>
    </a>

    <div class="flex-1 mx-6">
        @if (authService.isLoggedIn) {
            <finder></finder>
        }
    </div>

    <div class="flex items-center gap-2">
        <div class="cart-button-container">
            @if (authService.isLoggedIn) {
                <button hlmBtn variant="ghost" size="icon" routerLink="/cart">
                    <ng-icon name="lucideShoppingCart" />
                </button>
                <span class="cart-counter">{{ cart_counter }}</span>
            }
        </div>

        @if (authService.isLoggedIn) {
            <button hlmBtn variant="ghost" size="icon" class="user-menu-button"
                [hlmDropdownMenuTrigger]="userMenu"
                aria-label="User menu">
                <ng-icon name="lucideMenu" />
            </button>

            <ng-template #userMenu>
                <div hlmDropdownMenu>
                    <button hlmDropdownMenuItem [routerLink]="['user-profile/' + user_id]">
                        <ng-icon name="lucideUserCog" />
                        <span>User Profile</span>
                    </button>
                    <button hlmDropdownMenuItem [routerLink]="['orders/']">
                        <ng-icon name="lucideList" />
                        <span>Orders</span>
                    </button>
                    <div hlmDropdownMenuSeparator></div>
                    <button hlmDropdownMenuItem (click)="logout()">
                        <ng-icon name="lucideLogOut" />
                        <span>Logout</span>
                    </button>
                </div>
            </ng-template>
        }

        @if (!authService.isLoggedIn) {
            <button hlmBtn variant="ghost" type="button" routerLinkActive="active" routerLink="/log-in">
                <ng-icon name="lucideLogIn" />
                Sign in
            </button>
            <button hlmBtn variant="ghost" type="button" routerLinkActive="active" routerLink="/sign-up">
                <ng-icon name="lucideUserPlus" />
                Sign up
            </button>
        }
    </div>
</div>
