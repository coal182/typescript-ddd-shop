<h3>Cart</h3>

<div class="flex gap-6 animate__animated animate__fadeIn">
    <div class="flex-1">
        <div hlmTableContainer>
            <table hlmTable>
                <thead hlmTHead>
                    <tr hlmTr>
                        <th hlmTh>Image</th>
                        <th hlmTh>Name</th>
                        <th hlmTh>Qty</th>
                        <th hlmTh>Price</th>
                        <th hlmTh>Actions</th>
                    </tr>
                </thead>
                <tbody hlmTBody>
                    @for (item of items; track item.product.id) {
                        <tr hlmTr>
                            <td hlmTd>
                                <img
                                    [src]="item.product | image"
                                    class="cart-image"
                                    [routerLink]="['/products', item.product.id]" />
                            </td>
                            <td hlmTd>{{ item.product.name }}</td>
                            <td hlmTd>{{ item.qty }}</td>
                            <td hlmTd>{{ item.price | currency }}</td>
                            <td hlmTd>
                                <button
                                    hlmBtn
                                    size="icon"
                                    variant="ghost"
                                    type="button"
                                    [hlmTooltip]="'Remove'"
                                    (click)="removeFromCart(item)">
                                    <ng-icon name="lucideTrash" />
                                </button>
                            </td>
                        </tr>
                    }
                </tbody>
            </table>
        </div>

        <h1>Total:</h1>
        <h3>{{ total | currency }}</h3>
    </div>

    <div class="w-80">
        <form [formGroup]="checkoutForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
            <h3>Confirm your order</h3>

            <hlm-field>
                <label hlmLabel>Name</label>
                <input hlmInput type="text" formControlName="name" placeholder="Name" />
            </hlm-field>

            <hlm-field>
                <label hlmLabel>Street</label>
                <input hlmInput type="text" formControlName="street" placeholder="Street" />
            </hlm-field>

            <hlm-field>
                <label hlmLabel>City</label>
                <input hlmInput type="text" formControlName="city" placeholder="City" />
            </hlm-field>

            <hlm-field>
                <label hlmLabel>Number</label>
                <input hlmInput type="text" formControlName="number" placeholder="Number" />
            </hlm-field>

            <button
                hlmBtn
                type="submit"
                class="w-full"
                data-testid="submit-button"
                [disabled]="!checkoutForm.valid">
                Confirm purchase
            </button>
        </form>
    </div>
</div>
